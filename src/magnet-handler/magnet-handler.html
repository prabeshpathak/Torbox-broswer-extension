<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TorBox - Adding Download...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #12141B;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo { width: 64px; height: 64px; margin-bottom: 16px; }
    h1 { color: #04BF8A; font-size: 24px; margin-bottom: 8px; }
    .status { color: #9CA3AF; font-size: 14px; margin-bottom: 20px; }
    .status.success { color: #04BF8A; }
    .status.error { color: #ef4444; }
    .magnet-url {
      max-width: 500px;
      word-break: break-all;
      font-size: 11px;
      color: #6B7280;
      background: #1E2129;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
    .close-msg { color: #6B7280; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/icons/logo.svg" alt="TorBox" class="logo" />
    <h1>TorBox</h1>
    <p id="status" class="status">Processing magnet link...</p>
    <div id="magnet-url" class="magnet-url" style="display:none"></div>
    <p id="close-msg" class="close-msg" style="display:none">This tab will close automatically...</p>
  </div>
  <script src="./magnet-handler.js" type="module"></script>
</body>
</html>
